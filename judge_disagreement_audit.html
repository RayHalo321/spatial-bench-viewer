<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Judge Disagreement Audit</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --panel: #fff;
      --text: #20242c;
      --muted: #657083;
      --line: #d8dde6;
      --blue: #1769aa;
      --green: #157347;
      --red: #b42318;
      --amber: #8a5b00;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 16px 24px; border-bottom: 1px solid var(--line); background: var(--panel); }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 0; font-size: 21px; }
    h2 { font-size: 18px; }
    h3 { font-size: 16px; }
    nav { display: flex; flex-wrap: wrap; gap: 8px; }
    nav a, .download { padding: 6px 9px; border: 1px solid var(--line); border-radius: 5px; background: var(--panel); color: var(--text); text-decoration: none; font-size: 13px; }
    main { width: min(1440px, calc(100% - 32px)); margin: 24px auto 56px; }
    .intro { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--line); }
    .intro p { max-width: 900px; color: var(--muted); line-height: 1.55; }
    .stats { display: grid; grid-template-columns: repeat(2, 150px); gap: 8px; }
    .stat { padding: 12px; border-left: 3px solid var(--blue); background: var(--panel); }
    .stat strong { display: block; font-size: 22px; }
    .stat span { color: var(--muted); font-size: 12px; }
    section { margin-top: 28px; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); background: var(--panel); }
    table { width: 100%; min-width: 900px; border-collapse: collapse; }
    th, td { padding: 10px 11px; border-bottom: 1px solid var(--line); text-align: right; vertical-align: top; font-size: 12px; }
    th { background: #fafbfc; color: var(--muted); font-weight: 700; }
    th:first-child, td:first-child, .left { text-align: left; }
    tbody tr:last-child td { border-bottom: 0; }
    .changed { background: #fff7e6; }
    .ours { color: var(--blue); font-weight: 750; }
    .leader { color: var(--green); font-weight: 750; }
    .controls { display: flex; align-items: end; flex-wrap: wrap; gap: 12px; padding: 14px 0; }
    label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; }
    select { min-height: 36px; padding: 6px 30px 6px 9px; border: 1px solid var(--line); border-radius: 5px; background: var(--panel); color: var(--text); font: inherit; }
    .category { padding-top: 24px; border-top: 2px solid #aeb8c7; }
    .category-head { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 20px; align-items: start; }
    .category-head p { margin-bottom: 6px; color: var(--muted); }
    .score-pair { display: grid; grid-template-columns: repeat(2, minmax(140px, 1fr)); gap: 8px; }
    .score-pair div { padding: 9px 11px; border-left: 3px solid var(--line); background: var(--panel); font-size: 12px; }
    .score-pair strong { display: block; margin-top: 3px; font-size: 15px; }
    .case { padding: 24px 0; border-top: 1px solid var(--line); }
    .case:first-of-type { border-top: 0; }
    .case-title { display: flex; align-items: baseline; flex-wrap: wrap; gap: 8px; }
    .case-title h3 { margin-bottom: 6px; }
    .prompt { max-width: 1050px; margin-bottom: 10px; font-size: 15px; line-height: 1.55; }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .badge { padding: 3px 6px; border: 1px solid var(--line); border-radius: 4px; background: var(--panel); color: var(--muted); font-size: 11px; }
    .badge.warn { border-color: #dfbd71; background: #fff8e8; color: var(--amber); }
    .method-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(285px, 1fr)); gap: 12px; }
    figure { margin: 0; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: var(--panel); }
    figure.mismatch { border-color: #df9a94; }
    figcaption { min-height: 66px; padding: 9px 11px; border-bottom: 1px solid var(--line); }
    figcaption strong { display: block; margin-bottom: 4px; }
    .roles { display: flex; flex-wrap: wrap; gap: 5px; }
    .role { padding: 2px 5px; border-radius: 3px; background: #edf2f7; color: #4a5565; font-size: 10px; font-weight: 700; }
    .role.our-method { background: #e8f1f8; color: var(--blue); }
    .role.qwen-leader { background: #eaf6ef; color: var(--green); }
    .role.visual-leader { background: #fff3d7; color: var(--amber); }
    figure > a { display: block; background: #eceff2; }
    figure img { display: block; width: 100%; aspect-ratio: 1; object-fit: contain; }
    .scores { display: grid; grid-template-columns: 1fr repeat(4, auto); gap: 0; border-top: 1px solid var(--line); }
    .scores span { padding: 6px 7px; border-bottom: 1px solid var(--line); font-size: 11px; text-align: right; }
    .scores span:nth-child(5n + 1) { text-align: left; color: var(--muted); }
    .scores .fail { color: var(--red); font-weight: 750; }
    details { border-top: 1px solid var(--line); }
    summary { padding: 9px 11px; cursor: pointer; color: var(--blue); font-size: 12px; font-weight: 700; }
    .checks { padding: 0 11px 11px; }
    .check { padding: 10px 0; border-top: 1px solid var(--line); }
    .check:first-child { border-top: 0; }
    .check .question { margin-bottom: 6px; font-size: 12px; font-weight: 700; line-height: 1.4; }
    .check-grid { display: grid; grid-template-columns: 78px minmax(0, 1fr); gap: 5px 8px; font-size: 11px; line-height: 1.45; }
    .check-grid dt { color: var(--muted); }
    .check-grid dd { margin: 0; overflow-wrap: anywhere; }
    .answer { font-weight: 750; text-transform: uppercase; }
    .answer.no, .answer.unclear, .answer.missing { color: var(--red); }
    .empty { padding: 24px; border: 1px solid var(--line); background: var(--panel); color: var(--muted); }
    .note { color: var(--muted); font-size: 12px; line-height: 1.55; }
    @media (max-width: 760px) {
      header, .intro, .category-head { display: flex; align-items: flex-start; flex-direction: column; }
      header { padding: 14px 16px; }
      main { width: min(100% - 20px, 1440px); margin-top: 18px; }
      .stats, .score-pair { grid-template-columns: 1fr 1fr; width: 100%; }
      .method-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Judge Disagreement Audit</h1>
    <nav aria-label="Report navigation">
      <a href="v3_results.html">Results</a>
      <a href="index.html">Case viewer</a>
    </nav>
  </header>
  <main id="app"><p>Loading disagreement evidence...</p></main>
  <script>
    const pct = (value) => value == null ? "-" : (Number(value) * 100).toFixed(1) + "%";
    const h = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
    const scoreClass = (value) => Number(value) === 1 ? "" : "fail";
    const answerClass = (value) => `answer ${h(value || "missing")}`;
    let audit;
    let methodLabels;

    const names = (ids) => ids.map((id) => methodLabels[id] || id).join(", ");
    const headlineRow = (row) => `<tr class="${row.winner_changed || row.ours_rank_changed ? "changed" : ""}">
      <td>${h(row.label)}</td>
      <td><span class="leader">${h(names(row.visual.winner_ids))}</span><br>${pct(row.visual.best_score)}</td>
      <td><span class="leader">${h(names(row.qwen32.winner_ids))}</span><br>${pct(row.qwen32.best_score)}</td>
      <td class="ours">${pct(row.visual.ours_score)} · #${row.visual.ours_rank}</td>
      <td class="ours">${pct(row.qwen32.ours_score)} · #${row.qwen32.ours_rank}</td>
      <td>${row.winner_changed ? "Leader changed" : "Same leader"}${row.ours_rank_changed ? " · our rank changed" : ""}</td>
    </tr>`;

    const categoryRow = (row) => `<tr class="${row.winner_changed || row.ours_rank_changed ? "changed" : ""}">
      <td><a href="#${h(row.category)}">${h(row.label)}</a></td>
      <td>${h(names(row.visual.winner_ids))}<br>${pct(row.visual.best_score)}</td>
      <td>${h(names(row.qwen32.winner_ids))}<br>${pct(row.qwen32.best_score)}</td>
      <td class="ours">${pct(row.visual.ours_score)} · #${row.visual.ours_rank}</td>
      <td class="ours">${pct(row.qwen32.ours_score)} · #${row.qwen32.ours_rank}</td>
      <td>${row.review_case_count} / ${row.case_count}</td>
    </tr>`;

    function rolesFor(methodId, category) {
      const roles = [];
      if (methodId === audit.ours_method_id) roles.push(["Our method", "our-method"]);
      if (category.visual.winner_ids.includes(methodId)) roles.push(["Visual leader", "visual-leader"]);
      if (category.qwen32.winner_ids.includes(methodId)) roles.push(["Qwen32 leader", "qwen-leader"]);
      return roles.map(([label, cls]) => `<span class="role ${cls}">${label}</span>`).join("");
    }

    const answerLine = (label, answer) => {
      if (!answer) return `<dt>${label}</dt><dd><span class="answer missing">not recorded</span></dd>`;
      const confidence = answer.confidence == null ? "" : ` · confidence ${typeof answer.confidence === "number" ? Number(answer.confidence).toFixed(2) : h(answer.confidence)}`;
      const votes = answer.votes ? ` · votes ${h(answer.votes.join(" / "))}` : "";
      return `<dt>${label}</dt><dd><span class="${answerClass(answer.answer)}">${h(answer.answer)}</span>${confidence}${votes}<br>${h(answer.reason || "No reason recorded.")}</dd>`;
    };

    function methodFigure(methodId, result, category) {
      const checks = [...result.checks].sort((a, b) => Number(b.answer_mismatch) - Number(a.answer_mismatch) || Number(b.primary) - Number(a.primary));
      return `<figure class="${result.aggregate_mismatches.length ? "mismatch" : ""}">
        <figcaption><strong>${h(methodLabels[methodId])}</strong><div class="roles">${rolesFor(methodId, category)}</div></figcaption>
        <a href="${h(result.image)}" target="_blank"><img src="${h(result.image)}" alt="${h(methodLabels[methodId])} original output" loading="lazy"></a>
        <div class="scores">
          <span>Judge</span><span>Presence</span><span>Count</span><span>Primary</span><span>Exact</span>
          <span>Subagent</span><span class="${scoreClass(result.visual.presence)}">${pct(result.visual.presence)}</span><span class="${scoreClass(result.visual.cardinality)}">${pct(result.visual.cardinality)}</span><span class="${scoreClass(result.visual.primary_relation)}">${pct(result.visual.primary_relation)}</span><span class="${scoreClass(result.visual.exact)}">${result.visual.exact ? "PASS" : "FAIL"}</span>
          <span>Qwen32</span><span class="${scoreClass(result.qwen32.presence)}">${pct(result.qwen32.presence)}</span><span class="${scoreClass(result.qwen32.cardinality)}">${pct(result.qwen32.cardinality)}</span><span class="${scoreClass(result.qwen32.primary_relation)}">${pct(result.qwen32.primary_relation)}</span><span class="${scoreClass(result.qwen32.exact)}">${result.qwen32.exact ? "PASS" : "FAIL"}</span>
        </div>
        <details ${result.atomic_mismatch_count ? "open" : ""}><summary>${result.atomic_mismatch_count} atomic answer mismatch${result.atomic_mismatch_count === 1 ? "" : "es"} · inspect questions</summary>
          <div class="checks">${checks.map((check) => `<div class="check">
            <div class="question">${check.answer_mismatch ? "[Mismatch] " : ""}${check.primary ? "[Primary] " : ""}${h(check.question)}</div>
            <dl class="check-grid">${answerLine("Subagent", check.direct)}${answerLine("Qwen32", check.qwen32)}</dl>
          </div>`).join("")}</div>
        </details>
      </figure>`;
    }

    function caseBlock(item, category) {
      const reasonBadges = [
        ...item.judge_mismatch_methods.map((id) => `<span class="badge warn">Judge mismatch: ${h(methodLabels[id])}</span>`),
        ...item.qwen_leader_vs_ours_gap_methods.map((id) => `<span class="badge">Qwen gap: ${h(methodLabels[id])} vs ours</span>`),
        ...item.visual_leader_vs_ours_gap_methods.map((id) => `<span class="badge">Visual gap: ${h(methodLabels[id])} vs ours</span>`)
      ];
      return `<article class="case" data-case="${h(item.id)}">
        <div class="case-title"><h3>${h(item.id)}</h3><span class="badge">${h(item.difficulty)}</span></div>
        <p class="prompt">${h(item.prompt_en)}</p>
        <div class="badges">${reasonBadges.join("")}</div>
        <div class="method-grid">${category.selected_method_ids.map((methodId) => methodFigure(methodId, item.methods[methodId], category)).join("")}</div>
      </article>`;
    }

    function categorySection(category) {
      return `<section class="category" id="${h(category.category)}" data-category="${h(category.category)}">
        <div class="category-head"><div><h2>${h(category.label)}</h2><p>Qwen32 leaders: <span class="leader">${h(names(category.qwen32.winner_ids))}</span></p><p>Visual leaders: <span class="leader">${h(names(category.visual.winner_ids))}</span></p><p class="note">Showing ${category.review_case_count} of ${category.case_count} cases where a selected leader or our method changes judgment, or where the leader-vs-ours result drives the rank gap.</p></div>
        <div class="score-pair"><div>Our Subagent score<strong>${pct(category.visual.ours_score)} · #${category.visual.ours_rank}</strong></div><div>Our Qwen32 score<strong>${pct(category.qwen32.ours_score)} · #${category.qwen32.ours_rank}</strong></div></div></div>
        ${category.review_cases.length ? category.review_cases.map((item) => caseBlock(item, category)).join("") : '<div class="empty">No selected case-level disagreements.</div>'}
      </section>`;
    }

    function render() {
      const totals = audit.totals;
      document.getElementById("app").innerHTML = `
        <div class="intro"><div><h2>Subagent headline review vs Qwen3-VL-32B diagnostic</h2><p>This page does not alter any score. It exposes every leaderboard change and the original images behind case-level disagreements for the union of each category's Subagent leaders, Qwen32 leaders, and T2I-Blender + Qwen I2I.</p><a class="download" href="data/v3_judge_disagreement_audit_20260718.json">Download audit JSON</a> <a class="download" href="data/v3_judge_disagreement_audit_20260718.md">Download summary</a></div>
        <div class="stats"><div class="stat"><strong>${totals.headline_winner_changes}/8</strong><span>headline leaders changed</span></div><div class="stat"><strong>${totals.category_winner_changes}/8</strong><span>category leaders changed</span></div><div class="stat"><strong>${totals.review_case_entries}</strong><span>case entries to review</span></div><div class="stat"><strong>${totals.method_case_judge_disagreements}</strong><span>method-case judge mismatches</span></div><div class="stat"><strong>${totals.atomic_answer_disagreements}</strong><span>atomic answer mismatches</span></div></div></div>

        <section><h2>Headline report differences</h2><div class="table-wrap"><table><thead><tr><th>Metric</th><th>Subagent leader</th><th>Qwen32 leader</th><th>Our Subagent</th><th>Our Qwen32</th><th>Status</th></tr></thead><tbody>${audit.headline.map(headlineRow).join("")}</tbody></table></div></section>
        <section><h2>Eight original categories</h2><div class="table-wrap"><table><thead><tr><th>Category</th><th>Subagent leader</th><th>Qwen32 leader</th><th>Our Subagent</th><th>Our Qwen32</th><th>Review cases</th></tr></thead><tbody>${audit.categories.map(categoryRow).join("")}</tbody></table></div></section>

        <div class="controls"><label>Jump to category<select id="categorySelect"><option value="">All categories</option>${audit.categories.map((row) => `<option value="${h(row.category)}">${h(row.label)} (${row.review_case_count})</option>`).join("")}</select></label></div>
        <div id="categorySections">${audit.categories.map(categorySection).join("")}</div>
      `;
      document.getElementById("categorySelect").addEventListener("change", (event) => {
        document.querySelectorAll("[data-category]").forEach((section) => { section.hidden = event.target.value && section.dataset.category !== event.target.value; });
        if (event.target.value) document.getElementById(event.target.value).scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }

    fetch("data/v3_judge_disagreement_audit_20260718.json?v=20260718-audit")
      .then((response) => { if (!response.ok) throw new Error(`HTTP ${response.status}`); return response.json(); })
      .then((data) => { audit = data; methodLabels = Object.fromEntries(data.methods.map((method) => [method.id, method.label])); render(); })
      .catch((error) => { document.getElementById("app").innerHTML = `<div class="empty">Could not load audit data: ${h(error.message)}</div>`; });
  </script>
</body>
</html>
