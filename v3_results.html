<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Spatial Bench v3 Results</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --panel: #ffffff;
      --text: #20242c;
      --muted: #657083;
      --line: #d8dde6;
      --accent: #1769aa;
      --ok: #157347;
      --warn: #8a5b00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0; font-size: 21px; }
    h2 { margin: 0 0 12px; font-size: 17px; }
    p { line-height: 1.55; }
    nav { display: flex; flex-wrap: wrap; gap: 8px; }
    nav a {
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: var(--panel);
      text-decoration: none;
      font-size: 13px;
    }
    main { width: min(1240px, calc(100% - 32px)); margin: 24px auto 48px; }
    section { margin-top: 28px; }
    .intro {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }
    .intro p { max-width: 820px; margin: 8px 0 0; color: var(--muted); }
    .stamp { text-align: right; color: var(--muted); font-size: 12px; }
    .judge-switch { display: inline-flex; margin-top: 10px; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
    .judge-switch button {
      min-height: 32px;
      padding: 6px 10px;
      border: 0;
      border-right: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .judge-switch button:last-child { border-right: 0; }
    .judge-switch button[aria-pressed="true"] { background: #e9f1f8; color: var(--accent); }
    .status {
      margin-top: 16px;
      padding: 11px 14px;
      border-left: 4px solid var(--warn);
      background: #fff8e8;
      color: #60430b;
      font-size: 13px;
    }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); background: var(--panel); }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: right; font-size: 13px; }
    th { color: var(--muted); background: #fafbfc; font-weight: 650; }
    th:first-child, td:first-child { text-align: left; }
    tbody tr:last-child td { border-bottom: 0; }
    .model { font-weight: 700; }
    .scope { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; font-weight: 400; }
    .best { color: var(--ok); font-weight: 750; }
    .metric-note { margin: 8px 0 0; color: var(--muted); font-size: 12px; }
    .breakdown-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    select {
      min-height: 34px;
      padding: 5px 30px 5px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
    }
    .gallery { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    figure { margin: 0; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: var(--panel); }
    figcaption { padding: 9px 11px; border-bottom: 1px solid var(--line); font-size: 13px; font-weight: 700; }
    figure a { display: block; background: #eef0f3; }
    figure img { width: 100%; aspect-ratio: 16 / 10; object-fit: contain; display: block; }
    .method { padding: 16px 18px; border: 1px solid var(--line); background: var(--panel); }
    .method p { margin: 0 0 8px; color: var(--muted); font-size: 13px; }
    .method p:last-child { margin-bottom: 0; }
    .error { padding: 20px; border: 1px solid #d9a3a3; background: #fff3f3; color: #842029; }
    @media (max-width: 760px) {
      header, .intro { align-items: flex-start; flex-direction: column; }
      header { padding: 14px 16px; }
      main { width: min(100% - 20px, 1240px); margin-top: 18px; }
      .intro { display: flex; }
      .stamp { text-align: left; }
      .gallery { grid-template-columns: 1fr; }
      .breakdown-head { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Spatial Bench v3 Results</h1>
    <nav aria-label="Report navigation">
      <a href="index.html">Case viewer</a>
      <a href="our_pipeline_partial_report.html">Pipeline archive</a>
    </nav>
  </header>
  <main id="app"><p>Loading results...</p></main>
  <script>
    const pct = (value) => value == null ? "-" : (Number(value) * 100).toFixed(1) + "%";
    const h = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
    const detailMetricKeys = ["presence_micro", "cardinality_micro", "strict_relation_micro", "primary_relation_micro", "case_exact_rate"];
    const paperMetricKeys = ["presence", "cardinality", "layout_2d", "depth_contact_occlusion", "orientation_yaw", "multi_relation", "spatial_macro", "case_exact"];
    const modelMeta = [
      { id: "flux", auditId: "flux", label: "FLUX.1-schnell", scope: "93 cases · plain text-to-image", contact_sheet: "generated/v3_full93/flux_contact_sheet.jpg" },
      { id: "sdxl", auditId: "sdxl", label: "SDXL Base 1.0", scope: "93 cases · plain text-to-image", contact_sheet: "generated/v3_full93/sdxl_contact_sheet.jpg" },
      { id: "gligen", auditId: "gligen", label: "LayoutGPT + GLIGEN", scope: "93 cases · layout-guided generation", contact_sheet: "generated/v3_full93/gligen_contact_sheet.jpg" },
      { id: "lmd_plus", auditId: "lmd_plus", label: "LMD+", scope: "93 cases · LLM layout + grounded diffusion", contact_sheet: "generated/v3_full93/lmd_plus_contact_sheet.jpg" },
      { id: "boxdiff_xl", auditId: "boxdiff_xl", label: "LayoutGPT + BoxDiff-XL", scope: "93 cases · box-attention control", contact_sheet: "generated/v3_full93/boxdiff_xl_contact_sheet.jpg" },
      { id: "muses_qwen_rgb", auditId: "muses_qwen_rgb", label: "MUSES-Qwen RGB", scope: "93 cases · public MUSES planner + Blender RGB", contact_sheet: "generated/v3_full93/muses_qwen_rgb_contact_sheet.jpg" },
      { id: "muses_qwen_sdxl", auditId: "muses_qwen_sdxl", label: "MUSES-Qwen + SDXL", scope: "93 cases · MUSES RGB/depth + SDXL ControlNet", contact_sheet: "generated/v3_full93/muses_qwen_sdxl_contact_sheet.jpg" },
      { id: "muses_qwen_rgb_qwen_i2i", auditId: "muses_qwen_rgb_qwen_i2i", label: "MUSES-Qwen RGB + Qwen I2I", scope: "93 cases · MUSES RGB refined by Qwen", contact_sheet: "generated/v3_full93/muses_qwen_rgb_qwen_i2i_contact_sheet.jpg" },
      { id: "t2i_blender", auditId: "t2i_blender", label: "T2I-Blender RGB", scope: "93 cases · Blender-agent RGB render", contact_sheet: "generated/v3_full93/t2i_blender_contact_sheet.jpg" },
      { id: "t2i_blender_qwen", auditId: "t2i_blender_qwen", label: "T2I-Blender + Qwen I2I", scope: "93 cases · render-guided Qwen refinement", contact_sheet: "generated/v3_full93/t2i_blender_qwen_contact_sheet.jpg" }
    ];
    const state = { mode: "visual", visual: null, qwen32: null, final: null };
    const normalizeVisual = (row) => ({ ...row, case_exact_rate: row.exact_case_rate, cardinality_micro: row.cardinality_micro ?? null });
    const buildVisualModels = () => modelMeta.filter((meta) => state.visual.all_93.overall[meta.auditId]).map((meta) => ({
      ...meta,
      summary: {
        overall: normalizeVisual(state.visual.all_93.overall[meta.auditId]),
        by_capability: Object.fromEntries(Object.entries(state.visual.all_93.by_capability).map(([capability, rows]) => [capability, normalizeVisual(rows[meta.auditId])]))
      }
    }));
    const buildQwenModels = () => modelMeta.map((meta) => ({
      ...meta,
      summary: state.qwen32.models[meta.id]
    }));
    const detailMetricCells = (summary) => {
      return detailMetricKeys.map((key) => `<td>${pct(summary[key])}</td>`).join("");
    };
    const bestPaperMetrics = (rows) => {
      const out = {};
      for (const key of paperMetricKeys) {
        const values = rows.map((row) => row[key]).filter((value) => value != null).map(Number);
        out[key] = values.length ? Math.max(...values) : null;
      }
      return out;
    };
    const paperRow = (row, best) => {
      const meta = modelMeta.find((item) => item.id === row.method);
      const cells = paperMetricKeys.map((key) => `<td class="${row[key] === best[key] ? "best" : ""}">${pct(row[key])}</td>`).join("");
      return `<tr><td><span class="model">${h(meta.label)}</span><span class="scope">${h(meta.scope)}</span></td>${cells}</tr>`;
    };
    const difficultyRow = (row) => {
      const meta = modelMeta.find((item) => item.id === row.method);
      return `<tr><td><span class="model">${h(meta.label)}</span></td><td>${pct(row.diagnostic_exact)}</td><td>${pct(row.normal_exact)}</td><td>${pct(row.hard_exact)}</td></tr>`;
    };
    const capabilityRows = (model) => Object.entries(model.summary.by_capability).map(([name, row]) => `<tr><td>${h(name)}</td><td>${row.cases}</td>${detailMetricCells(row)}</tr>`).join("");

    function render() {
        const visualMode = state.mode === "visual";
        const models = visualMode ? buildVisualModels() : buildQwenModels();
        const paperRows = state.final[visualMode ? "visual" : "qwen32_diagnostic"].rows;
        const best = bestPaperMetrics(paperRows);
        document.getElementById("app").innerHTML = `
          <div class="intro">
            <div><h1>${visualMode ? "Adjudicated spatial evaluation" : "Qwen3-VL-32B diagnostic evaluation"}</h1><p>${visualMode ? "Ten methods were evaluated on the same 93 cases with direct visual review. Missing count judgments and the refined T2I-Blender output received blind first passes plus independent adjudication of every disputed cell." : "Ten methods were evaluated with Qwen3-VL-32B-Instruct using three votes per atomic question. This remains a secondary diagnostic view, not the headline ground truth."}</p></div>
            <div class="stamp">${visualMode ? "Judge: direct multi-reviewer visual adjudication" : "Judge: Qwen3-VL-32B-Instruct · 3-vote"}<br>Frozen 2026-07-18<div class="judge-switch" role="group" aria-label="Evaluation protocol"><button type="button" data-mode="visual" aria-pressed="${visualMode}">Visual adjudication</button><button type="button" data-mode="qwen32" aria-pressed="${!visualMode}">Qwen3-VL-32B</button></div></div>
          </div>

          <div class="status">${visualMode ? "Headline protocol. All ten methods now include Presence, Cardinality, explicit Relation checks, and the same strict Case Exact definition." : "Secondary diagnostic only. Each atomic answer is the majority of three Qwen3-VL-32B votes; fail, unclear, missing, and API error score 0."}</div>

          <section>
            <h2>Main paper table · 93 cases</h2>
            <div class="table-wrap"><table>
              <thead><tr><th>Method</th><th>Presence</th><th>Cardinality</th><th>2D Layout</th><th>Depth / Contact / Occlusion</th><th>Orientation / Yaw</th><th>Multi-Relation</th><th>Spatial Macro</th><th>Case Exact</th></tr></thead>
              <tbody>${paperRows.map((row) => paperRow(row, best)).join("")}</tbody>
            </table></div>
            <p class="metric-note">Spatial Macro is the unweighted macro average of primary relation accuracy over the eight original categories. Case Exact requires every required object instance, exact count, and explicit relation to pass. Cross-method scores do not include T2I-Blender-only extraction metadata.</p>
          </section>

          <section>
            <h2>Exact case pass by difficulty</h2>
            <div class="table-wrap"><table>
              <thead><tr><th>Method</th><th>Diagnostic · 42</th><th>Normal · 26</th><th>Hard · 25</th></tr></thead>
              <tbody>${paperRows.map(difficultyRow).join("")}</tbody>
            </table></div>
            <p class="metric-note">Difficulty rows use the same strict Case Exact rule. They are reported separately rather than mixed through a hand-chosen weight.</p>
          </section>

          <section>
            <div class="breakdown-head"><h2>Capability breakdown</h2><label>Method <select id="modelSelect">${models.map((model) => `<option value="${h(model.id)}">${h(model.label)} (${model.summary.overall.cases})</option>`).join("")}</select></label></div>
            <div class="table-wrap"><table>
              <thead><tr><th>Capability</th><th>Cases</th><th>Presence</th><th>Cardinality</th><th>Strict relation</th><th>Primary relation</th><th>Exact case</th></tr></thead>
              <tbody id="capabilityRows"></tbody>
            </table></div>
          </section>

          <section>
            <h2>Visual audit sheets</h2>
            <div class="gallery">${models.map((model) => `<figure><figcaption>${h(model.label)} · ${h(model.scope)}</figcaption><a href="${h(model.contact_sheet)}"><img src="${h(model.contact_sheet)}" alt="${h(model.label)} contact sheet" loading="lazy"></a></figure>`).join("")}</div>
          </section>

          <section class="method"><h2>Evaluation protocol</h2><p>${visualMode ? "Reviewers saw the prompt, explicit object and relation checklist, and generated image. Blind direct-visual first passes were followed by an independent review of every first-pass/Qwen32 disagreement. Qwen32 never replaced the final visual decision." : "Qwen3-VL-32B-Instruct answered every materialized presence, cardinality, positive relation, and inverse relation question three times at temperature 0.2. Majority voting produced the displayed answer and reason."}</p><p>Primary scoring is strict: pass = 1; fail and unclear = 0. Case Exact requires presence, cardinality, and every explicit relation.</p><p>${visualMode ? '<a href="data/v3_visual_audit_20260718_ten_method_adjudicated_summary.json">Download the adjudicated summary</a> · <a href="data/v3_visual_audit_20260718_ten_method_adjudicated.jsonl">Download all case-level decisions</a> · <a href="data/v3_visual_review_provenance_20260718/README.md">Review provenance</a>' : '<a href="data/v3_qwen32_voted_20260718_summary.json">Download the Qwen32 summary</a> · <a href="data/v3_viewer_cases.json">Inspect compact per-case answers in viewer data</a>'} · <a href="data/v3_final_paper_table_20260718.csv">Download paper table CSV</a> · <a href="data/v3_final_paper_table_20260718.json">Download paper table JSON</a></p></section>`;

        const select = document.getElementById("modelSelect");
        const renderBreakdown = () => {
          const model = models.find((item) => item.id === select.value);
          document.getElementById("capabilityRows").innerHTML = capabilityRows(model);
        };
        select.addEventListener("change", renderBreakdown);
        document.querySelectorAll("[data-mode]").forEach((button) => button.addEventListener("click", () => {
          state.mode = button.dataset.mode;
          render();
        }));
        renderBreakdown();
    }

    Promise.all([
      fetch("data/v3_visual_audit_20260718_ten_method_adjudicated_summary.json?v=20260718-final-table").then((response) => { if (!response.ok) throw new Error(`Visual HTTP ${response.status}`); return response.json(); }),
      fetch("data/v3_qwen32_voted_20260718_summary.json?v=20260718-final-table").then((response) => { if (!response.ok) throw new Error(`Qwen32 HTTP ${response.status}`); return response.json(); }),
      fetch("data/v3_final_paper_table_20260718.json?v=20260718-final-table").then((response) => { if (!response.ok) throw new Error(`Final table HTTP ${response.status}`); return response.json(); })
    ])
      .then(([visual, qwen32, final]) => { state.visual = visual; state.qwen32 = qwen32; state.final = final; render(); })
      .catch((error) => { document.getElementById("app").innerHTML = `<div class="error">Could not load v3 results: ${h(error.message)}</div>`; });
  </script>
</body>
</html>
