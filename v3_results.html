<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Spatial Bench v3 Results</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --panel: #ffffff;
      --text: #20242c;
      --muted: #657083;
      --line: #d8dde6;
      --accent: #1769aa;
      --ok: #157347;
      --warn: #8a5b00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0; font-size: 21px; }
    h2 { margin: 0 0 12px; font-size: 17px; }
    p { line-height: 1.55; }
    nav { display: flex; flex-wrap: wrap; gap: 8px; }
    nav a {
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: var(--panel);
      text-decoration: none;
      font-size: 13px;
    }
    main { width: min(1240px, calc(100% - 32px)); margin: 24px auto 48px; }
    section { margin-top: 28px; }
    .intro {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }
    .intro p { max-width: 820px; margin: 8px 0 0; color: var(--muted); }
    .stamp { text-align: right; color: var(--muted); font-size: 12px; }
    .status {
      margin-top: 16px;
      padding: 11px 14px;
      border-left: 4px solid var(--warn);
      background: #fff8e8;
      color: #60430b;
      font-size: 13px;
    }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); background: var(--panel); }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: right; font-size: 13px; }
    th { color: var(--muted); background: #fafbfc; font-weight: 650; }
    th:first-child, td:first-child { text-align: left; }
    tbody tr:last-child td { border-bottom: 0; }
    .model { font-weight: 700; }
    .scope { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; font-weight: 400; }
    .best { color: var(--ok); font-weight: 750; }
    .metric-note { margin: 8px 0 0; color: var(--muted); font-size: 12px; }
    .breakdown-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    select {
      min-height: 34px;
      padding: 5px 30px 5px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
    }
    .gallery { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    figure { margin: 0; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: var(--panel); }
    figcaption { padding: 9px 11px; border-bottom: 1px solid var(--line); font-size: 13px; font-weight: 700; }
    figure a { display: block; background: #eef0f3; }
    figure img { width: 100%; aspect-ratio: 16 / 10; object-fit: contain; display: block; }
    .method { padding: 16px 18px; border: 1px solid var(--line); background: var(--panel); }
    .method p { margin: 0 0 8px; color: var(--muted); font-size: 13px; }
    .method p:last-child { margin-bottom: 0; }
    .error { padding: 20px; border: 1px solid #d9a3a3; background: #fff3f3; color: #842029; }
    @media (max-width: 760px) {
      header, .intro { align-items: flex-start; flex-direction: column; }
      header { padding: 14px 16px; }
      main { width: min(100% - 20px, 1240px); margin-top: 18px; }
      .intro { display: flex; }
      .stamp { text-align: left; }
      .gallery { grid-template-columns: 1fr; }
      .breakdown-head { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Spatial Bench v3 Results</h1>
    <nav aria-label="Report navigation">
      <a href="index.html">Case viewer</a>
      <a href="vqa_report.html">Legacy report</a>
      <a href="our_pipeline_partial_report.html">Pipeline archive</a>
    </nav>
  </header>
  <main id="app"><p>Loading results...</p></main>
  <script>
    const pct = (value) => value == null ? "-" : (Number(value) * 100).toFixed(1) + "%";
    const h = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
    const metricCells = (summary, best) => {
      const keys = ["presence_micro", "cardinality_micro", "strict_relation_micro", "case_exact_rate"];
      return keys.map((key) => `<td class="${best && best[key] === summary[key] ? "best" : ""}">${pct(summary[key])}</td>`).join("");
    };
    const bestMetrics = (models) => {
      const out = {};
      for (const key of ["presence_micro", "cardinality_micro", "strict_relation_micro", "case_exact_rate"]) {
        out[key] = Math.max(...models.map((model) => Number(model.summary.overall[key] || 0)));
      }
      return out;
    };
    const summaryRow = (model, best) => `<tr><td><span class="model">${h(model.label)}</span><span class="scope">${h(model.scope)}</span></td><td>${model.summary.overall.cases}</td>${metricCells(model.summary.overall, best)}<td>${model.summary.overall.errors}</td></tr>`;
    const capabilityRows = (model) => Object.entries(model.summary.by_capability).map(([name, row]) => `<tr><td>${h(name)}</td><td>${row.cases}</td>${metricCells(row)}<td>${row.errors}</td></tr>`).join("");

    fetch("data/v3_results_20260716.json")
      .then((response) => { if (!response.ok) throw new Error(`HTTP ${response.status}`); return response.json(); })
      .then((data) => {
        const models = data.full97.models;
        const best = bestMetrics(models);
        const pipeline = data.pipeline_pilot;
        document.getElementById("app").innerHTML = `
          <div class="intro">
            <div><h1>Strict spatial evaluation</h1><p>${h(data.description)}</p></div>
            <div class="stamp">Judge: ${h(data.judge.model)}<br>${h(data.generated_at)}</div>
          </div>
          <div class="status"><strong>T2I-Blender full-suite status:</strong> ${h(data.pipeline_full.status_note)}</div>

          <section>
            <h2>Full 97-case comparison</h2>
            <div class="table-wrap"><table>
              <thead><tr><th>Method</th><th>Cases</th><th>Presence</th><th>Cardinality</th><th>Strict relation</th><th>Exact case</th><th>Judge errors</th></tr></thead>
              <tbody>${models.map((model) => summaryRow(model, best)).join("")}</tbody>
            </table></div>
            <p class="metric-note">Best values are highlighted. All three rows use the same 97 prompts and the same local judge.</p>
          </section>

          <section>
            <h2>T2I-Blender pilot</h2>
            <div class="table-wrap"><table>
              <thead><tr><th>Method</th><th>Cases</th><th>Presence</th><th>Cardinality</th><th>Strict relation</th><th>Exact case</th><th>Judge errors</th></tr></thead>
              <tbody>${summaryRow(pipeline)}</tbody>
            </table></div>
            <p class="metric-note">Pilot-only result. It is reported separately and is not ranked against the 97-case baselines.</p>
          </section>

          <section>
            <div class="breakdown-head"><h2>Capability breakdown</h2><label>Method <select id="modelSelect">${[...models, pipeline].map((model) => `<option value="${h(model.id)}">${h(model.label)} (${model.summary.overall.cases})</option>`).join("")}</select></label></div>
            <div class="table-wrap"><table>
              <thead><tr><th>Capability</th><th>Cases</th><th>Presence</th><th>Cardinality</th><th>Strict relation</th><th>Exact case</th><th>Judge errors</th></tr></thead>
              <tbody id="capabilityRows"></tbody>
            </table></div>
          </section>

          <section>
            <h2>Visual audit sheets</h2>
            <div class="gallery">${[...models, pipeline].map((model) => `<figure><figcaption>${h(model.label)} · ${h(model.scope)}</figcaption><a href="${h(model.contact_sheet)}"><img src="${h(model.contact_sheet)}" alt="${h(model.label)} contact sheet" loading="lazy"></a></figure>`).join("")}</div>
          </section>

          <section class="method"><h2>Evaluation protocol</h2><p>${h(data.judge.protocol)}</p><p>Primary scoring is strict: pass = 1; fail, unclear, contradiction, missing answer, and runtime error = 0. Presence gates relation scoring, and errors remain in the denominator.</p><p><a href="data/v3_results_20260716.json">Download the published result summary.</a></p></section>`;

        const allModels = [...models, pipeline];
        const select = document.getElementById("modelSelect");
        const renderBreakdown = () => {
          const model = allModels.find((item) => item.id === select.value);
          document.getElementById("capabilityRows").innerHTML = capabilityRows(model);
        };
        select.addEventListener("change", renderBreakdown);
        renderBreakdown();
      })
      .catch((error) => { document.getElementById("app").innerHTML = `<div class="error">Could not load v3 results: ${h(error.message)}</div>`; });
  </script>
</body>
</html>
