<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Spatial Bench v3 Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --canvas: #f4f6f8;
      --surface: #ffffff;
      --surface-alt: #f8fafc;
      --ink: #20252d;
      --muted: #697386;
      --line: #d9dee7;
      --blue: #315fbd;
      --blue-soft: #eaf0fc;
      --green: #27734d;
      --green-soft: #e7f4ed;
      --red: #a43c3c;
      --red-soft: #f9eaea;
      --amber: #8a6419;
      --amber-soft: #fff3d5;
      --radius: 7px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--canvas);
      color: var(--ink);
      font: 14px/1.45 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, select { font: inherit; }
    button, select, input { letter-spacing: 0; }
    a { color: var(--blue); }

    .topbar {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .brand { min-width: 0; }
    .brand h1 { margin: 0; font-size: 18px; line-height: 1.2; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
    .top-actions { display: flex; align-items: center; gap: 12px; flex: none; }
    .report-link {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      text-decoration: none;
      background: var(--surface);
      font-weight: 600;
    }
    .report-link:hover { border-color: var(--blue); color: var(--blue); }

    .workspace {
      display: grid;
      grid-template-columns: 235px 315px minmax(600px, 1fr);
      min-height: calc(100vh - 58px);
    }
    .filters, .case-panel, .detail { min-width: 0; background: var(--surface); }
    .filters, .case-panel { border-right: 1px solid var(--line); }
    .filters {
      padding: 16px;
      position: sticky;
      top: 58px;
      height: calc(100vh - 58px);
      overflow: auto;
    }
    .filters h2, .case-panel h2, .section-title {
      margin: 0;
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }
    .filter-stack { display: grid; gap: 12px; margin-top: 12px; }
    .field { display: grid; gap: 5px; }
    .field label { color: var(--muted); font-size: 12px; font-weight: 600; }
    .field input, .field select {
      width: 100%;
      min-height: 36px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      color: var(--ink);
    }
    .field input:focus, .field select:focus {
      outline: 2px solid var(--blue-soft);
      border-color: var(--blue);
    }
    .dataset-summary {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .summary-row { display: flex; justify-content: space-between; gap: 12px; }
    .summary-row strong { color: var(--ink); }
    .pipeline-note {
      margin-top: 16px;
      padding: 10px;
      border: 1px solid #c9d7ee;
      border-radius: var(--radius);
      background: #f2f6fd;
      color: #304d7d;
      font-size: 12px;
    }
    .pipeline-note strong { display: block; margin-bottom: 3px; color: #24416f; }

    .case-panel {
      position: sticky;
      top: 58px;
      height: calc(100vh - 58px);
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .case-panel-head {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }
    #visibleCount { color: var(--muted); font-size: 12px; }
    .case-list { overflow: auto; }
    .case-row {
      width: 100%;
      display: block;
      padding: 12px 14px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }
    .case-row:hover { background: var(--surface-alt); }
    .case-row[aria-current="true"] {
      background: var(--blue-soft);
      box-shadow: inset 3px 0 0 var(--blue);
    }
    .case-row-top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .case-id { font-weight: 800; font-size: 13px; }
    .case-difficulty { color: var(--muted); font-size: 11px; text-transform: capitalize; }
    .case-category { color: var(--blue); font-size: 11px; margin-top: 2px; }
    .case-prompt {
      margin-top: 6px;
      color: #414a59;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .empty { padding: 24px 16px; color: var(--muted); text-align: center; }

    .detail {
      padding: 20px 22px 48px;
      overflow: hidden;
    }
    .detail-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }
    .detail-title { min-width: 0; }
    .detail-title h2 { margin: 0; font-size: 24px; line-height: 1.15; }
    .detail-meta { margin-top: 5px; color: var(--muted); }
    .count-pills { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-alt);
      color: #4f5969;
      font-size: 11px;
      white-space: nowrap;
    }
    .prompt-band { padding: 16px 0; border-bottom: 1px solid var(--line); }
    .prompt-en { margin: 0; font-size: 18px; line-height: 1.5; }
    .prompt-zh { margin: 7px 0 0; color: var(--muted); }

    .model-section { padding: 18px 0; border-bottom: 1px solid var(--line); }
    .model-section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .judge-label { color: var(--muted); font-size: 12px; }
    .model-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .model-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
    }
    .model-card-head {
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
    }
    .model-name { font-weight: 750; min-width: 0; }
    .exact {
      flex: none;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .exact.pass { color: var(--green); background: var(--green-soft); }
    .exact.fail { color: var(--red); background: var(--red-soft); }
    .model-image-link { display: block; background: #e9edf2; }
    .model-image {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }
    .model-scores {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--line);
    }
    .metric { padding: 8px 5px; text-align: center; min-width: 0; }
    .metric + .metric { border-left: 1px solid var(--line); }
    .metric strong { display: block; font-size: 13px; }
    .metric span { color: var(--muted); font-size: 9px; text-transform: uppercase; }
    .model-error { padding: 8px 10px; color: var(--red); background: var(--red-soft); font-size: 11px; }

    .spec-section { padding: 18px 0; border-bottom: 1px solid var(--line); }
    .spec-grid { display: grid; grid-template-columns: minmax(180px, 0.7fr) minmax(300px, 1.3fr); gap: 24px; }
    .object-list { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
    .object-chip {
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: var(--surface-alt);
      font-size: 12px;
    }
    .object-chip strong { color: var(--blue); }
    .relation-list { display: grid; gap: 6px; margin: 10px 0 0; padding: 0; list-style: none; }
    .relation-list li {
      padding: 7px 9px;
      border-left: 3px solid #aab9d4;
      background: var(--surface-alt);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      overflow-wrap: anywhere;
    }
    .relation-list li.primary { border-left-color: var(--blue); }

    .check-section { padding-top: 18px; }
    .check-table-wrap { margin-top: 10px; overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); }
    table { width: 100%; border-collapse: collapse; min-width: 880px; background: var(--surface); }
    th, td { padding: 9px 10px; border-bottom: 1px solid var(--line); vertical-align: top; text-align: left; }
    th { background: var(--surface-alt); color: var(--muted); font-size: 11px; text-transform: uppercase; }
    tr:last-child td { border-bottom: 0; }
    th:first-child { width: 42%; }
    .check-kind { display: block; margin-bottom: 3px; color: var(--blue); font-size: 10px; font-weight: 800; text-transform: uppercase; }
    .expected { color: var(--muted); font-size: 11px; margin-top: 3px; }
    .answer-details { min-width: 120px; }
    .answer-details summary { list-style: none; cursor: pointer; }
    .answer-details summary::-webkit-details-marker { display: none; }
    .answer {
      display: inline-flex;
      align-items: center;
      min-width: 56px;
      justify-content: center;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .answer.yes { color: var(--green); background: var(--green-soft); }
    .answer.no { color: var(--red); background: var(--red-soft); }
    .answer.unclear { color: var(--amber); background: var(--amber-soft); }
    .answer.missing { color: var(--muted); background: #edf0f4; }
    .answer-reason { margin-top: 6px; color: var(--muted); font-size: 11px; line-height: 1.35; }
    .load-error { margin: 40px auto; max-width: 560px; color: var(--red); }

    @media (max-width: 1220px) {
      .workspace { grid-template-columns: 210px 280px minmax(520px, 1fr); }
      .detail { padding-inline: 16px; }
      .model-grid { gap: 8px; }
      .model-card-head { align-items: flex-start; flex-direction: column; }
    }
    @media (max-width: 920px) {
      .workspace { grid-template-columns: 230px minmax(0, 1fr); }
      .filters { grid-column: 1; }
      .case-panel { grid-column: 2; }
      .detail { grid-column: 1 / -1; border-top: 1px solid var(--line); }
      .filters, .case-panel { position: relative; top: auto; height: 430px; }
      .model-card-head { flex-direction: row; align-items: center; }
    }
    @media (max-width: 680px) {
      .topbar { align-items: flex-start; padding: 10px 12px; }
      .brand p { display: none; }
      .report-link { font-size: 12px; }
      .workspace { display: block; }
      .filters { height: auto; position: static; border-right: 0; border-bottom: 1px solid var(--line); padding: 12px; }
      .filter-stack { grid-template-columns: 1fr 1fr; }
      .field:first-child { grid-column: 1 / -1; }
      .dataset-summary, .pipeline-note { display: none; }
      .case-panel { height: 260px; position: static; border-right: 0; border-bottom: 1px solid var(--line); }
      .detail { padding: 16px 12px 36px; }
      .detail-head { display: block; }
      .count-pills { justify-content: flex-start; margin-top: 10px; }
      .prompt-en { font-size: 16px; }
      .model-grid { grid-template-columns: 1fr; }
      .model-card-head { flex-direction: row; }
      .spec-grid { grid-template-columns: 1fr; gap: 18px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Spatial Bench v3 Viewer</h1>
      <p>Prompt-level comparison with strict local Qwen3-VL-8B evaluation</p>
    </div>
    <div class="top-actions">
      <span id="headerCount">Loading 97 cases...</span>
      <a class="report-link" href="v3_results.html">Results table</a>
    </div>
  </header>

  <main class="workspace">
    <aside class="filters" aria-label="Case filters">
      <h2>Filters</h2>
      <div class="filter-stack">
        <div class="field">
          <label for="search">Search prompt or ID</label>
          <input id="search" type="search" placeholder="e.g. sofa, ORI-H01">
        </div>
        <div class="field">
          <label for="category">Capability</label>
          <select id="category"><option value="">All capabilities</option></select>
        </div>
        <div class="field">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty"><option value="">All difficulties</option></select>
        </div>
        <div class="field">
          <label for="subset">Subset</label>
          <select id="subset"><option value="">All subsets</option></select>
        </div>
      </div>
      <div class="dataset-summary" id="datasetSummary"></div>
      <div class="pipeline-note">
        <strong>T2I-Blender run in progress</strong>
        RGB renders and Qwen redraws will be added here after the complete run finishes.
      </div>
    </aside>

    <section class="case-panel" aria-label="Benchmark cases">
      <div class="case-panel-head">
        <h2>Cases</h2>
        <span id="visibleCount"></span>
      </div>
      <div class="case-list" id="caseList"></div>
    </section>

    <section class="detail" id="detail" aria-live="polite">
      <div class="empty">Loading benchmark data...</div>
    </section>
  </main>

  <script>
    const state = { data: null, filtered: [], selectedId: null };
    const $ = id => document.getElementById(id);

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      })[char]);
    }

    function titleCase(value) {
      return String(value ?? "").replaceAll("_", " ").replace(/\b\w/g, char => char.toUpperCase());
    }

    function fillSelect(id, values) {
      const select = $(id);
      [...new Set(values)].sort().forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = titleCase(value);
        select.append(option);
      });
    }

    function metric(value) {
      return Number.isFinite(value) ? `${Math.round(value * 100)}%` : "N/A";
    }

    function counted(value, noun) {
      return `${value} ${noun}${value === 1 ? "" : "s"}`;
    }

    function relationText(relation) {
      const target = relation.target
        ?? (Array.isArray(relation.targets) ? relation.targets.join(", ") : "")
        ?? relation.scene_region
        ?? "";
      const parts = [
        relation.subject,
        relation.type,
        target || relation.scene_region,
        relation.facing_intent,
        relation.facing_part,
        relation.frame ? `frame=${relation.frame}` : "",
        relation.occlusion_policy
      ].filter(Boolean);
      return parts.join(" · ");
    }

    function renderSummary() {
      const cases = state.data.cases;
      const relations = cases.reduce((sum, item) => sum + item.derived.constraint_count, 0);
      const objects = cases.reduce((sum, item) => sum + item.derived.object_count, 0);
      $("headerCount").textContent = `${cases.length} cases`;
      $("datasetSummary").innerHTML = `
        <div class="summary-row"><span>Cases</span><strong>${cases.length}</strong></div>
        <div class="summary-row"><span>Object instances</span><strong>${objects}</strong></div>
        <div class="summary-row"><span>Explicit relations</span><strong>${relations}</strong></div>
        <div class="summary-row"><span>Displayed models</span><strong>${state.data.models.length}</strong></div>
      `;
    }

    function applyFilters() {
      if (!state.data) return;
      const query = $("search").value.trim().toLowerCase();
      const category = $("category").value;
      const difficulty = $("difficulty").value;
      const subset = $("subset").value;
      state.filtered = state.data.cases.filter(item => {
        const haystack = `${item.id} ${item.prompt_en} ${item.prompt_zh} ${item.category}`.toLowerCase();
        return (!query || haystack.includes(query))
          && (!category || item.category === category)
          && (!difficulty || item.difficulty === difficulty)
          && (!subset || item.subset === subset);
      });
      if (!state.filtered.some(item => item.id === state.selectedId)) {
        state.selectedId = state.filtered[0]?.id ?? null;
      }
      renderCaseList();
      renderDetail();
    }

    function renderCaseList() {
      $("visibleCount").textContent = `${state.filtered.length} shown`;
      if (!state.filtered.length) {
        $("caseList").innerHTML = '<div class="empty">No cases match these filters.</div>';
        return;
      }
      $("caseList").innerHTML = state.filtered.map(item => `
        <button class="case-row" type="button" data-id="${escapeHtml(item.id)}" aria-current="${item.id === state.selectedId}">
          <span class="case-row-top">
            <span class="case-id">${escapeHtml(item.id)}</span>
            <span class="case-difficulty">${escapeHtml(item.difficulty)}</span>
          </span>
          <span class="case-category">${escapeHtml(titleCase(item.category))}</span>
          <span class="case-prompt">${escapeHtml(item.prompt_en)}</span>
        </button>
      `).join("");
      document.querySelectorAll(".case-row").forEach(button => {
        button.addEventListener("click", () => selectCase(button.dataset.id));
      });
    }

    function selectCase(id, updateHash = true) {
      state.selectedId = id;
      if (updateHash) history.replaceState(null, "", `#${encodeURIComponent(id)}`);
      renderCaseList();
      renderDetail();
      if (window.innerWidth <= 920) $("detail").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function modelCard(model, result) {
      const exact = result.exact ? "pass" : "fail";
      return `
        <article class="model-card">
          <div class="model-card-head">
            <span class="model-name">${escapeHtml(model.label)}</span>
            <span class="exact ${exact}">${result.exact ? "Exact pass" : "Exact fail"}</span>
          </div>
          <a class="model-image-link" href="${escapeHtml(result.image)}" target="_blank" rel="noreferrer" title="Open full image">
            <img class="model-image" src="${escapeHtml(result.image)}" alt="${escapeHtml(model.label)} output" loading="lazy">
          </a>
          <div class="model-scores">
            <div class="metric"><strong>${metric(result.presence)}</strong><span>Presence</span></div>
            <div class="metric"><strong>${metric(result.cardinality)}</strong><span>Cardinality</span></div>
            <div class="metric"><strong>${metric(result.relation)}</strong><span>Relation</span></div>
          </div>
          ${result.error ? `<div class="model-error">Judge error: ${escapeHtml(result.error)}</div>` : ""}
        </article>
      `;
    }

    function answerCell(result, checkId) {
      const entry = result.answers[checkId];
      const answer = String(entry?.answer ?? "missing").toLowerCase();
      return `
        <details class="answer-details">
          <summary><span class="answer ${escapeHtml(answer)}">${escapeHtml(answer)}</span></summary>
          <div class="answer-reason">${escapeHtml(entry?.reason || "No judge explanation recorded.")}</div>
        </details>
      `;
    }

    function renderDetail() {
      if (!state.data) return;
      const item = state.data.cases.find(entry => entry.id === state.selectedId);
      if (!item) {
        $("detail").innerHTML = '<div class="empty">Select a case to inspect it.</div>';
        return;
      }
      const modelCards = state.data.models.map(model => modelCard(model, item.results[model.id])).join("");
      const objectChips = item.objects.map(object => `
        <span class="object-chip"><strong>${escapeHtml(object.id)}</strong> · ${escapeHtml(object.canonical)}</span>
      `).join("");
      const relations = item.relations.map(relation => `
        <li class="${relation.primary ? "primary" : ""}">${escapeHtml(relation.id)} · ${escapeHtml(relationText(relation))}</li>
      `).join("");
      const modelHeaders = state.data.models.map(model => `<th>${escapeHtml(model.label)}</th>`).join("");
      const checkRows = item.checks.map(check => `
        <tr>
          <td>
            <span class="check-kind">${escapeHtml(check.kind)}</span>
            ${escapeHtml(check.question)}
            <div class="expected">Expected: ${escapeHtml(check.expected)}</div>
          </td>
          ${state.data.models.map(model => `<td>${answerCell(item.results[model.id], check.id)}</td>`).join("")}
        </tr>
      `).join("");

      $("detail").innerHTML = `
        <div class="detail-head">
          <div class="detail-title">
            <h2>${escapeHtml(item.id)}</h2>
            <div class="detail-meta">${escapeHtml(titleCase(item.category))} · ${escapeHtml(titleCase(item.subset))} · ${escapeHtml(titleCase(item.difficulty))}</div>
          </div>
          <div class="count-pills">
            <span class="pill">${counted(item.derived.object_count, "object")}</span>
            <span class="pill">${counted(item.derived.constraint_count, "relation")}</span>
            <span class="pill">${counted(item.derived.family_count, "family")}</span>
          </div>
        </div>

        <div class="prompt-band">
          <p class="prompt-en">${escapeHtml(item.prompt_en)}</p>
          <p class="prompt-zh">${escapeHtml(item.prompt_zh)}</p>
        </div>

        <section class="model-section">
          <div class="model-section-head">
            <h3 class="section-title">Generated outputs</h3>
            <span class="judge-label">Judge: ${escapeHtml(state.data.judge)}</span>
          </div>
          <div class="model-grid">${modelCards}</div>
        </section>

        <section class="spec-section">
          <div class="spec-grid">
            <div>
              <h3 class="section-title">Object instances</h3>
              <div class="object-list">${objectChips}</div>
            </div>
            <div>
              <h3 class="section-title">Explicit relations</h3>
              <ul class="relation-list">${relations}</ul>
            </div>
          </div>
        </section>

        <section class="check-section">
          <h3 class="section-title">Atomic scoring checklist</h3>
          <div class="check-table-wrap">
            <table>
              <thead><tr><th>Question</th>${modelHeaders}</tr></thead>
              <tbody>${checkRows}</tbody>
            </table>
          </div>
        </section>
      `;
    }

    async function loadViewer() {
      try {
        const response = await fetch("data/v3_viewer_cases.json");
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        state.data = await response.json();
        fillSelect("category", state.data.cases.map(item => item.category));
        fillSelect("difficulty", state.data.cases.map(item => item.difficulty));
        fillSelect("subset", state.data.cases.map(item => item.subset));
        renderSummary();
        const requested = decodeURIComponent(location.hash.slice(1));
        state.selectedId = state.data.cases.some(item => item.id === requested) ? requested : state.data.cases[0]?.id;
        applyFilters();
      } catch (error) {
        $("detail").innerHTML = `<div class="load-error"><strong>Viewer data could not be loaded.</strong><br>${escapeHtml(error.message)}<br><br>Open this page through the published site or a local HTTP server.</div>`;
        $("headerCount").textContent = "Data unavailable";
      }
    }

    ["search", "category", "difficulty", "subset"].forEach(id => $(id).addEventListener("input", applyFilters));
    window.addEventListener("hashchange", () => {
      const id = decodeURIComponent(location.hash.slice(1));
      if (state.data?.cases.some(item => item.id === id)) selectCase(id, false);
    });
    loadViewer();
  </script>
</body>
</html>
