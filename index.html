<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spatial Prompt Bench Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --panel: #fffdf8;
      --panel-soft: #fbf6ed;
      --text: #2f2a24;
      --muted: #756f66;
      --line: #e7ded2;
      --accent: #b85c38;
      --accent-soft: #f3dfd4;
      --ok: #46784e;
      --fail: #a6463c;
      --unclear: #8a6b22;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1,
    .detail h2,
    .summary-title {
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif;
    }
    header h1 { font-size: 20px; margin: 0; letter-spacing: 0; }
    header .stats { color: var(--muted); font-size: 13px; }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .toggle-sidebar, .report-link { min-height: 30px; padding: 5px 9px; }
    .report-link { display: inline-flex; align-items: center; border: 1px solid var(--line); border-radius: 6px; color: var(--text); text-decoration: none; background: var(--panel); }
    main {
      display: grid;
      grid-template-columns: 300px minmax(300px, 400px) minmax(520px, 1fr);
      min-height: calc(100vh - 60px);
    }
    body.sidebar-collapsed main {
      grid-template-columns: minmax(300px, 400px) minmax(620px, 1fr);
    }
    body.sidebar-collapsed aside { display: none; }
    aside, section.list, section.detail {
      min-width: 0;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }
    aside { padding: 16px; overflow: auto; max-height: calc(100vh - 60px); }
    .summary-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-soft);
      padding: 14px;
      margin-bottom: 16px;
    }
    .summary-title {
      font-size: 19px;
      font-weight: 700;
      margin: 0 0 2px;
    }
    .summary-subtitle { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .summary-stat {
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--panel);
      padding: 8px;
      min-width: 0;
    }
    .summary-stat strong { display: block; font-size: 17px; line-height: 1.1; }
    .summary-stat span { color: var(--muted); font-size: 11px; }
    .summary-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      border: 0;
      font-size: 11px;
      background: transparent;
    }
    .summary-table th,
    .summary-table td {
      border-bottom: 1px solid var(--line);
      padding: 5px 3px;
      white-space: nowrap;
      text-align: right;
    }
    .summary-table th:first-child,
    .summary-table td:first-child {
      width: 38%;
      text-align: left;
    }
    .summary-table th:not(:first-child),
    .summary-table td:not(:first-child) { width: 12.4%; }
    .summary-table .category-cell {
      max-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .summary-table th { color: var(--muted); background: transparent; font-size: 10px; }
    .summary-table tr.selected td { color: var(--accent); font-weight: 700; }
    .filter-group { margin-bottom: 14px; }
    label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    select, input[type="search"] {
      width: 100%;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 9px;
      background: var(--panel);
      color: var(--text);
    }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 6px;
      min-height: 32px;
      padding: 6px 10px;
      cursor: pointer;
    }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .case-list {
      height: calc(100vh - 60px);
      overflow: auto;
      padding: 10px;
    }
    .case-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      margin-bottom: 10px;
      cursor: pointer;
    }
    .case-item:hover { background: #fff8ef; }
    .case-item.active { background: #fff7ee; border-left: 4px solid var(--accent); padding-left: 9px; }
    .case-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
    .case-id { font-weight: 700; }
    .meta { color: var(--muted); font-size: 12px; margin: 3px 0; }
    .prompt-small {
      color: var(--text);
      font-size: 13px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .prompt-small-en { color: var(--muted); font-size: 12px; margin-top: 3px; }
    .detail { padding: 24px 28px; overflow: auto; height: calc(100vh - 60px); border-right: 0; }
    .detail h2 { margin: 0; font-size: 30px; line-height: 1.05; }
    .detail-head { margin-bottom: 14px; }
    .detail-meta { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
    .prompt-box {
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      padding: 14px 16px;
      background: #fff8ef;
      margin: 10px 0 16px;
      font-size: 16px;
    }
    .prompt-zh { font-size: 17px; font-weight: 650; }
    .prompt-en { color: var(--muted); font-size: 13px; margin-top: 6px; }
    .model-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
    .model-sample { margin: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: var(--panel); }
    .model-sample figcaption { display: flex; justify-content: space-between; gap: 8px; align-items: baseline; padding: 8px 10px; border-bottom: 1px solid var(--line); }
    .model-name { font-weight: 700; font-size: 13px; }
    .model-score { color: var(--muted); font-size: 11px; text-align: right; }
    .model-image {
      aspect-ratio: 1 / 1;
      background: #efe7dc;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .model-image img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .model-image a { width: 100%; height: 100%; display: block; }
    .judge-note { color: var(--muted); font-size: 11px; margin: -6px 0 10px; }
    .detail-review {
      display: grid;
      grid-template-columns: minmax(560px, 1.05fr) minmax(520px, .95fr);
      gap: 16px;
      align-items: start;
    }
    .visual-pane,
    .checklist-pane { min-width: 0; }
    .checklist-scroll {
      overflow: auto;
      max-height: calc(100vh - 270px);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
    }
    .checklist-table { min-width: 760px; border: 0; }
    .checklist-table th {
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .pending { color: var(--muted); padding: 36px; text-align: center; }
    .section-title { font-size: 15px; font-weight: 700; margin: 18px 0 8px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 9px;
      background: var(--panel);
      font-size: 12px;
    }
    .level-pill,
    .cap-pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-soft);
      padding: 2px 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
      white-space: nowrap;
    }
    .level-pill.hard { color: #8d3d2a; background: #f8e3d7; border-color: #edc6b5; }
    .level-pill.normal { color: #64512d; background: #f6edcf; border-color: #e7d49b; }
    .level-pill.simple { color: #52633a; background: #edf3df; border-color: #d7e3bd; }
    .cap-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .cap-pill { color: #4d463e; background: #fbefe5; border-color: #ecd4c4; }
    .cap-pill.presence { background: #eef0e8; border-color: #d9ddcf; }
    .sample-dot {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: var(--ok);
      flex: 0 0 auto;
    }
    .sample-dot.missing { background: var(--fail); }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin: 8px 0 12px;
    }
    .info-panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      background: var(--panel);
      min-width: 0;
    }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; background: var(--panel); border: 1px solid var(--line); }
    th, td { border-bottom: 1px solid var(--line); padding: 9px; text-align: left; vertical-align: top; }
    th { background: var(--panel-soft); font-size: 12px; color: var(--muted); }
    tr:last-child td { border-bottom: 0; }
    .score-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
    .score-buttons button { font-size: 12px; min-height: 28px; }
    .score-buttons button.selected.pass { background: #e8f7ee; color: var(--ok); border-color: var(--ok); }
    .score-buttons button.selected.fail { background: #fdebea; color: var(--fail); border-color: var(--fail); }
    .score-buttons button.selected.unclear { background: #fff4d6; color: var(--unclear); border-color: var(--unclear); }
    textarea {
      width: 100%;
      min-height: 34px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px;
      font: inherit;
      background: var(--panel);
    }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
    @media (max-width: 1500px) {
      .detail-review { grid-template-columns: 1fr; }
    }
    @media (max-width: 1000px) {
      header { align-items: flex-start; gap: 8px; padding: 10px 12px; }
      header h1 { font-size: 17px; }
      .header-actions { gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
      header .stats { display: none; }
      main { grid-template-columns: 1fr; }
      body.sidebar-collapsed main { grid-template-columns: 1fr; }
      aside, section.list, section.detail { height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
      aside { max-height: none; }
      .case-list { height: min(420px, 45vh); max-height: 420px; }
      .detail { height: auto; max-height: none; }
      .info-grid, .detail-review { grid-template-columns: 1fr; }
      .model-grid { grid-template-columns: 1fr; }
      .checklist-scroll { max-height: none; }
    }
  </style>
</head>

      support: "Support / 支撑接触容器",
      occlusion: "Occlusion / 遮挡可见性",
      orientation: "Facing / 朝向",
      rotation: "Rotation / 旋转",
      presence: "Object / 物体出现",
    };
    const CAPABILITY_SHORT = {
      absolute_location: "Location",
      relation: "2D Relation",
      depth: "Depth",
      support: "Support",
      occlusion: "Occlusion",
      orientation: "Facing",
      rotation: "Rotation",
      presence: "Object",
    };
    const CATEGORY_SHORT = {
      absolute_location_2d: "Location",
      relative_position_2d: "2D Relation",
      depth_front_back: "Depth",
      occlusion_visibility: "Occlusion",
      support_contact: "Support",
      orientation_facing: "Facing",
      rotation_yaw: "Rotation",
      multi_relation_composition: "Multi",
    };

    function scoreOf(caseId, checkId) { return localStorage.getItem(scoreKey(caseId, checkId)) || ""; }
    function noteOf(caseId, checkId) { return localStorage.getItem(noteKey(caseId, checkId)) || ""; }
    function setScore(caseId, checkId, score) { localStorage.setItem(scoreKey(caseId, checkId), score); renderDetail(); }
    function setNote(caseId, checkId, note) { localStorage.setItem(noteKey(caseId, checkId), note); }
    function levelOf(c) { return c.level || c.difficulty || "unknown"; }
    function abilityChecks(c) { return (c.checklist || []).filter(x => x.type !== "presence"); }
    function relationCount(c) { return c.pair_count ?? abilityChecks(c).length; }
    function abilityTags(c) {
      return [...new Set(abilityChecks(c).map(x => x.type))]
        .sort((a, b) => capabilityRank(a) - capabilityRank(b));
    }
    function capabilityRank(type) {
      const index = CAPABILITY_ORDER.indexOf(type);
      return index === -1 ? 99 : index;
    }
    function capabilityLabel(type) { return CAPABILITY_LABELS[type] || type; }
    function capabilityShort(type) { return CAPABILITY_SHORT[type] || type; }
    function categoryShort(category) { return CATEGORY_SHORT[category] || category; }
    function pct(value) { return `${(Number(value || 0) * 100).toFixed(1)}%`; }
    function capabilityPills(types, limit = Infinity, includePresence = false) {
      const visible = types.filter(type => includePresence || type !== "presence").slice(0, limit);
      const extra = Math.max(0, types.filter(type => includePresence || type !== "presence").length - visible.length);
      const pills = visible.map(type => `<span class="cap-pill ${escapeAttr(type)}">${escapeHtml(capabilityShort(type))}</span>`);
      if (extra) pills.push(`<span class="cap-pill">+${extra}</span>`);
      return pills.join("");
    }
    function summarizeCases(cases) {
      const summary = {
        cases: cases.length,
        simple: 0,
        normal: 0,
        hard: 0,
        spatialChecks: 0,
        presenceChecks: 0,
        checklistRows: 0,
        samples: 0,
        categories: {},
      };
      for (const c of cases) {
        const level = levelOf(c);
        if (level in summary) summary[level] += 1;
        const checks = c.checklist || [];
        const spatial = checks.filter(x => x.type !== "presence").length;
        const presence = checks.length - spatial;
        summary.spatialChecks += spatial;
        summary.presenceChecks += presence;
        summary.checklistRows += checks.length;
        if (c.sample?.status === "success" && c.sample?.image) summary.samples += 1;
        const cat = summary.categories[c.category] ||= { cases: 0, simple: 0, normal: 0, hard: 0, spatialChecks: 0 };
        cat.cases += 1;
        if (level in cat) cat[level] += 1;
        cat.spatialChecks += spatial;
      }
      return summary;
    }
    function renderSummary() {
      const selectedCategory = document.getElementById("category").value;
      const summary = summarizeCases(CASES);
      const view = summarizeCases(filtered);
      const categoryRows = Object.keys(summary.categories).sort().map(category => {
        const cat = summary.categories[category];
        const selected = category === selectedCategory ? "selected" : "";
        return `<tr class="${selected}">
          <td class="category-cell" title="${escapeAttr(category)}">${escapeHtml(categoryShort(category))}</td>
          <td>${cat.cases}</td>
          <td>${cat.simple}</td>
          <td>${cat.normal}</td>
          <td>${cat.hard}</td>
          <td>${cat.spatialChecks}</td>
        </tr>`;
      }).join("");
      const modelRows = (MODEL_DATA.models || []).map(model => {
        const overall = model.summary?.overall || {};
        return `<tr><td class="category-cell">${escapeHtml(model.label)}</td><td>${pct(overall.presence_macro)}</td><td>${pct(overall.relation_micro)}</td><td>${pct(overall.exact_case_pass_rate)}</td></tr>`;
      }).join("");
      document.getElementById("summary").innerHTML = `
        <div class="summary-title">${escapeHtml(selectedCategory || "General")}</div>
        <div class="summary-subtitle">${filtered.length} filtered / ${summary.cases} total cases</div>
        <div class="summary-grid">
          <div class="summary-stat"><strong>${summary.cases}</strong><span>cases</span></div>
          <div class="summary-stat"><strong>${summary.samples}/${summary.cases}</strong><span>samples</span></div>
          <div class="summary-stat"><strong>${summary.simple}/${summary.normal}/${summary.hard}</strong><span>simple / normal / hard</span></div>
          <div class="summary-stat"><strong>${summary.spatialChecks}</strong><span>spatial checks</span></div>
          <div class="summary-stat"><strong>${summary.presenceChecks}</strong><span>presence checks</span></div>
          <div class="summary-stat"><strong>${view.spatialChecks}</strong><span>filtered checks</span></div>
        </div>
        <table class="summary-table">
          <thead><tr><th>Model</th><th>P</th><th>R</th><th>Exact</th></tr></thead>
          <tbody>${modelRows}</tbody>
        </table>
        <table class="summary-table">
          <thead><tr><th>Category</th><th>All</th><th>S</th><th>N</th><th>H</th><th>Checks</th></tr></thead>
          <tbody>${categoryRows}</tbody>
        </table>`;
    }

    function applyFilters() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const cat = document.getElementById("category").value;
      const diff = document.getElementById("difficulty").value;
      const img = document.getElementById("imageStatus").value;
      filtered = CASES.filter(c => {
        const hay = `${c.id} ${c.prompt} ${c.prompt_zh || ""} ${c.category} ${c.subtype} ${c.level || c.difficulty}`.toLowerCase();
        const hasImage = c.sample && c.sample.image && c.sample.status === "success";
        return (!q || hay.includes(q)) &&
          (!cat || c.category === cat) &&
          (!diff || (c.level || c.difficulty) === diff) &&
          (!img || (img === "success" ? hasImage : !hasImage));
      });
      if (!filtered.find(c => c.id === selectedId)) selectedId = filtered[0]?.id || "";
      renderSummary();
      renderList();
      renderDetail();
    }

    function renderList() {
      document.getElementById("stats").textContent = `${filtered.length} / ${CASES.length} cases`;
      const el = document.getElementById("caseList");
      el.innerHTML = filtered.map(c => `
        <div class="case-item ${c.id === selectedId ? "active" : ""}" data-id="${c.id}">
          <div class="case-top">
            <span class="case-id">${c.id}</span>
            <span class="level-pill ${escapeAttr(levelOf(c))}">${escapeHtml(levelOf(c))}</span>
            <span class="sample-dot ${c.sample?.status === "success" ? "" : "missing"}"></span>
          </div>
          <div class="meta">${c.category} · ${c.subtype || ""} · ${relationCount(c)} constraints</div>
          <div class="prompt-small">${escapeHtml(c.prompt_zh || c.prompt)}</div>
          <div class="prompt-small-en">${escapeHtml(c.prompt)}</div>
          <div class="cap-row">${capabilityPills(abilityTags(c), 3)}</div>
        </div>`).join("");
      el.querySelectorAll(".case-item").forEach(item => item.addEventListener("click", () => {
        selectedId = item.dataset.id;
        renderList();
        renderDetail();
      }));
    }

    function renderDetail() {
      const c = CASES.find(item => item.id === selectedId);
      const el = document.getElementById("detail");
      if (!c) { el.innerHTML = '<div class="pending">No case selected</div>'; return; }
      const modelImages = (MODEL_DATA.models || []).map(model => {
        const src = model.imageTemplate.replace("{id}", c.id);
        const score = model.cases?.[c.id] || {};
        const overall = model.summary?.overall || {};
        return `<figure class="model-sample">
          <figcaption>
            <span class="model-name">${escapeHtml(model.label)}</span>
            <span class="model-score">case P ${pct(score.presence)} · R ${pct(score.relation)}<br>overall R ${pct(overall.relation_micro)}</span>
          </figcaption>
          <div class="model-image"><a href="${escapeAttr(src)}" target="_blank" rel="noopener"><img src="${escapeAttr(src)}" alt="${escapeAttr(`${c.id} ${model.label}`)}" loading="lazy"></a></div>
        </figure>`;
      }).join("");
      const objects = (c.objects || []).map(o => `<span class="chip">${escapeHtml(o.alias_zh || o.alias || o.name || o.canonical)} <span class="meta">${escapeHtml(o.alias || o.role || "")}</span></span>`).join("");
      const pairs = (c.checklist || []).filter(x => x.type !== "presence").map(x => `<span class="chip">${escapeHtml(x.pair_zh || `${x.subject} ${x.relation} ${x.target || ""}`)}</span>`).join("");
      const caps = abilityTags(c);
      const rows = (c.checklist || []).map(x => {
        const score = scoreOf(c.id, x.check_id);
        return `<tr>
          <td><span class="cap-pill ${escapeAttr(x.type)}">${escapeHtml(capabilityShort(x.type))}</span></td>
          <td><strong>${escapeHtml(x.label_zh)}</strong><br><span class="meta">${escapeHtml(x.label_en)}</span><br><span class="meta">VQA: ${escapeHtml(x.vqa_question)} → ${escapeHtml(x.expected_answer)}</span></td>
          <td><code>${escapeHtml(x.subject)} ${escapeHtml(x.relation)} ${escapeHtml(x.target || "")}</code></td>
          <td>
            <div class="score-buttons">
              ${["pass","fail","unclear"].map(s => `<button class="${s} ${score === s ? "selected" : ""}" onclick="setScore('${escapeJs(c.id)}','${escapeJs(x.check_id)}','${s}')">${s}</button>`).join("")}
            </div>
          </td>
          <td><textarea oninput="setNote('${escapeJs(c.id)}','${escapeJs(x.check_id)}',this.value)">${escapeHtml(noteOf(c.id, x.check_id))}</textarea></td>
        </tr>`;
      }).join("");
      el.innerHTML = `
        <div class="detail-head">
          <h2>${escapeHtml(c.id)}</h2>
          <div class="detail-meta">
            <span class="level-pill ${escapeAttr(levelOf(c))}">${escapeHtml(levelOf(c))}</span>
            <span class="cap-pill">${escapeHtml(c.category)}</span>
            <span class="cap-pill">${escapeHtml(c.subtype || "")}</span>
            <span class="cap-pill">${escapeHtml(relationCount(c))} constraints</span>
          </div>
          <div class="cap-row">${capabilityPills(caps)}</div>
        </div>
        <div class="prompt-box">
          <div class="prompt-zh">${escapeHtml(c.prompt_zh || c.prompt)}</div>
          <div class="prompt-en">${escapeHtml(c.prompt)}</div>
        </div>
        <div class="detail-review">
          <div class="visual-pane">
            <div class="section-title">Model Comparison</div>
            <div class="judge-note">${escapeHtml(MODEL_DATA.judge?.model || "")} · 76 cases · 174 relation checks</div>
            <div class="model-grid">${modelImages}</div>
            <div class="info-grid">
              <div class="info-panel">
                <div class="section-title">Objects</div>
                <div class="chips">${objects}</div>
              </div>
              <div class="info-panel">
                <div class="section-title">Relation Checks</div>
                <div class="chips">${pairs}</div>
              </div>
            </div>
          </div>
          <div class="checklist-pane">
            <div class="section-title">Scoring Checklist</div>
            <div class="checklist-scroll">
              <table class="checklist-table">
                <thead><tr><th>Type</th><th>Check</th><th>Pair</th><th>Score</th><th>Note</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        </div>
        `;
    }

    function exportScores() {
      const lines = [];
      const now = new Date().toISOString();
      for (const c of CASES) {
        for (const x of c.checklist || []) {
          const score = scoreOf(c.id, x.check_id);
          const note = noteOf(c.id, x.check_id);
          if (!score && !note) continue;
          lines.push(JSON.stringify({
            prompt_id: c.id,
            prompt: c.prompt,
            prompt_zh: c.prompt_zh || "",
            level: c.level || c.difficulty,
            pair_count: c.pair_count || 0,
            image_path: c.sample?.image_path || "",
            check_id: x.check_id,
            type: x.type,
            subject: x.subject,
            relation: x.relation,
            target: x.target,
            question_zh: x.vqa_question_zh || x.label_zh || "",
            question: x.vqa_question || "",
            score,
            note,
            scorer: "human",
            timestamp: now
          }));
        }
      }
      const blob = new Blob([lines.join("\n") + (lines.length ? "\n" : "")], {type: "application/jsonl"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "scores.jsonl";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function clearScores() {
      if (!confirm("Clear local scores for this viewer?")) return;
      Object.keys(localStorage).filter(k => k.startsWith("spatial_score:") || k.startsWith("spatial_note:")).forEach(k => localStorage.removeItem(k));
      renderDetail();
    }

    function setSidebarCollapsed(collapsed) {
      document.body.classList.toggle("sidebar-collapsed", collapsed);
      localStorage.setItem("spatial_sidebar_collapsed", collapsed ? "1" : "0");
      const button = document.getElementById("toggleSidebar");
      button.textContent = collapsed ? "Show sidebar" : "Hide sidebar";
      button.setAttribute("aria-expanded", collapsed ? "false" : "true");
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[ch]));
    }
    function escapeAttr(value) { return escapeHtml(value); }
    function escapeJs(value) { return String(value ?? "").replace(/\\/g, "\\\\").replace(/'/g, "\\'"); }

    ["search","category","difficulty","imageStatus"].forEach(id => document.getElementById(id).addEventListener("input", applyFilters));
    document.getElementById("exportScores").addEventListener("click", exportScores);
    document.getElementById("clearScores").addEventListener("click", clearScores);
    document.getElementById("toggleSidebar").addEventListener("click", () => {
      setSidebarCollapsed(!document.body.classList.contains("sidebar-collapsed"));
    });
    setSidebarCollapsed(localStorage.getItem("spatial_sidebar_collapsed") === "1");
    applyFilters();
  </script>
</body>
</html>
